# =============================================================================
# Actions Policy File - Exemple
# =============================================================================
# Ce fichier définit les actions que Node-RED peut déclencher via:
# POST /actions/<name>/run
#
# Chaque action est prédéfinie et ne peut pas être modifiée à l'exécution.
# Les noms ci-dessous sont des exemples. Remplacez-les par les noms adaptés à
# votre installation.
# =============================================================================

allowed_actions:
  nextcloud-backup-example:
    type: nextcloud_aio_backup
    description: "Sauvegarde Nextcloud AIO vers un dépôt prédéfini"
    remote_repo: "ssh://backup_user@example.org:22//path/to/nextcloud/borg"
    daily_backup: true
    check_backup: false
    restore_after: true
    stop_containers: true
    start_containers: true
    automatic_updates: false
    stop_timeout: 60
    timeout: 21600

  borgmatic-backup-example:
    type: borgmatic_backup
    description: "Sauvegarde borgmatic d'un label prédéfini"
    # Correspond au fichier /etc/borgmatic.d/<repository>.yaml ou .yml.
    repository: "example_repository"
    stats: true
    progress: true
    verbosity: 1
    stop_timeout: 60
    timeout: 21600

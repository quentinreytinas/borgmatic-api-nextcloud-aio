name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'borgmatic_api.py'
      - 'borgmatic_api_app/**'
      - 'entrypoint.sh'
      - '.github/workflows/build.yml'
  schedule:
    # Rebuild quotidien à 3h pour détecter mises à jour borgmatic:latest
    - cron: '0 3 * * *'
  workflow_dispatch:  # Permet déclenchement manuel

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

       - name: Set up Docker Buildx
         uses: docker/setup-buildx-action@v3

       - name: Extract metadata (multi-arch)
         id: meta
         uses: docker/metadata-action@v5
         with:
           images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
           tags: |
             type=ref,event=branch
             type=sha,prefix={{branch}}-
             type=raw,value=latest,enable={{is_default_branch}}
             type=ref,event=branch,suffix=-amd64
             type=sha,prefix={{branch}}-,suffix=-amd64
             type=raw,value=latest-amd64,enable={{is_default_branch}}
             type=ref,event=branch,suffix=-arm64
             type=sha,prefix={{branch}}-,suffix=-arm64
             type=raw,value=latest-arm64,enable={{is_default_branch}}

       - name: Build and push Docker image (multi-platform)
         uses: docker/build-push-action@v5
         with:
           context: .
           pull: true
           push: true
           platforms: linux/amd64,linux/arm64/v8
           tags: ${{ steps.meta.outputs.tags }}
           labels: ${{ steps.meta.outputs.labels }}
           cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
           cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed with tags ${{ steps.meta.outputs.tags }}"
name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'borgmatic_api.py'
      - 'borgmatic_api_app/**'
      - 'entrypoint.sh'
      - '.github/workflows/build.yml'
  schedule:
    # Rebuild quotidien à 3h pour détecter mises à jour borgmatic:latest
    - cron: '0 3 * * *'
  workflow_dispatch:  # Permet déclenchement manuel

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- amd64 ---
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (amd64)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-amd64
            type=sha,prefix={{branch}}-,suffix=-amd64
            type=raw,value=latest-amd64,enable={{is_default_branch}}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          pull: true
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max

  # --- arm64 ---
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (arm64)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-arm64
            type=sha,prefix={{branch}}-,suffix=-arm64
            type=raw,value=latest-arm64,enable={{is_default_branch}}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          pull: true
          push: true
          platforms: linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

  # --- multi-arch manifest (latest, main, sha) ---
  create-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (latest)
        if: github.ref == 'refs/heads/main'
        run: |
          IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          docker buildx imagetools create -t $IMG:latest \
            $IMG:main-amd64 \
            $IMG:main-arm64
          docker buildx imagetools create -t $IMG:main \
            $IMG:main-amd64 \
            $IMG:main-arm64

      - name: Create multi-arch manifest (sha)
        if: github.ref == 'refs/heads/main'
        run: |
          IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SHA=${{ github.sha }}
          docker buildx imagetools create -t $IMG:main-$SHA \
            $IMG:main-amd64 \
            $IMG:main-arm64

      - name: Image digest
        run: echo "Multi-arch manifest created successfully"